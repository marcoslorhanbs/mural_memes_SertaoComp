<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mural de Memes{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-size: 1.4rem; }
    .card-img-top { height: 200px; object-fit: cover; }
    .badge-categoria { font-size: 0.75rem; }
    footer { border-top: 1px solid #dee2e6; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-success shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'memes:lista' %}">
        🎭 Mural de Memes
      </a>
      <a href="{% url 'memes:enviar' %}" class="btn btn-light btn-sm fw-semibold">
        + Enviar Meme
      </a>
    </div>
  </nav>

  <main class="container py-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted py-3 mt-4">
    <small>🎭 Mural de Memes — Projeto Django</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
